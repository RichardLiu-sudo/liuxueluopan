<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#B8453A" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#B8453A" font-weight="600">逆袭潜力群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">

<circle cx="0" cy="-85" r="40" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
<path d="M-35,-115 Q-10,-140 20,-125 L35,-118" fill="#B8453A" stroke="#1B2A4A" stroke-width="1"/>
<line x1="-14" y1="-94" x2="-8" y2="-90" stroke="#1B2A4A" stroke-width="3" stroke-linecap="round"/>
<line x1="14" y1="-94" x2="20" y2="-90" stroke="#1B2A4A" stroke-width="3" stroke-linecap="round"/>
<line x1="-10" y1="-68" x2="10" y2="-70" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round"/>
<path d="M-35,-45 Q-80,-20 -90,40 L-45,50 Z" fill="#B8453A" opacity="0.5"/>
<polygon points="-38,-40 35,-40 45,65 -25,65" fill="#B8453A" stroke="#1B2A4A" stroke-width="2"/>
<text x="5" y="28" text-anchor="middle" font-size="24" fill="#F7F6F3">★</text>
<path d="M55,-55 L55,55" stroke="#C9A96E" stroke-width="3" stroke-linecap="round"/>
<polygon points="48,-45 55,-62 62,-45" fill="#C9A96E"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">RISE</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">逆袭者</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"GPA 3.0，但已经在改变世界了"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#B8453A" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->

    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• GPA 3.0 / SAT 1300</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 创办社会企业，年服务5000+学生</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 获省级社会创新奖</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 价值远不能用分数衡量</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 用创业经历证明学术潜力</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#B8453A" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>