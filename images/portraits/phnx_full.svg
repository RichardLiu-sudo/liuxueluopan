<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">逆袭潜力群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <circle cx="0" cy="-85" r="43" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-14" cy="-93" r="4" fill="#1B2A4A"/><circle cx="14" cy="-93" r="4" fill="#1B2A4A"/>
    <path d="M-10,-72 Q0,-60 10,-72" fill="none" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
    <polygon points="-45,-30 45,-30 55,70 -55,70" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <path d="M0,-8 Q-15,10 -10,25 Q-5,18 0,25 Q5,18 10,25 Q15,10 0,-8" fill="#C9A96E" opacity="0.6"/>
    <path d="M0,5 Q-10,18 -7,28 Q-3,22 0,28 Q3,22 7,28 Q10,18 0,5" fill="#C9A96E"/>
    <circle cx="0" cy="40" r="4" fill="#F7F6F3"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">PHNX</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">凤凰</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"从灰烬里飞出来的，不怕再烧一次"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• GPA 2.7记录了一段黑暗时期</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 最近学期GPA 3.5</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 从低谷爬出来的复原力</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 优势：已证明拥有大学成功的关键品质</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：文书坦诚有力讲述重生故事</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>