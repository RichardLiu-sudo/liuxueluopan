<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">稳步前进群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <circle cx="0" cy="-85" r="44" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-15" cy="-93" r="4" fill="#1B2A4A"/><circle cx="15" cy="-93" r="4" fill="#1B2A4A"/>
    <path d="M-10,-72 Q0,-64 10,-72" fill="none" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
    <rect x="-40" y="-28" width="80" height="95" rx="6" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <line x1="-25" y1="-10" x2="25" y2="-10" stroke="#C9A96E" stroke-width="2"/>
    <line x1="-25" y1="5" x2="25" y2="5" stroke="#C9A96E" stroke-width="2"/>
    <line x1="-25" y1="20" x2="25" y2="20" stroke="#C9A96E" stroke-width="2"/>
    <line x1="-25" y1="35" x2="15" y2="35" stroke="#C9A96E" stroke-width="2"/>
    <rect x="-5" y="-20" width="12" height="12" rx="2" fill="#C9A96E" opacity="0.8"/>
    <rect x="-5" y="5" width="12" height="12" rx="2" fill="#C9A96E" opacity="0.6"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">NOTE</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">笔记侠</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"最努力的那个，但好像总是差一点"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• 传说级笔记系统</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 彩色标签/思维导图/错题本</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 勤奋但方法不对</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 挑战：效率与方法的突破</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：文书展示"顿悟"时刻</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>