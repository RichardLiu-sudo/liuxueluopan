<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">特殊画像</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <circle cx="0" cy="-85" r="45" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-16" cy="-93" r="5" fill="#1B2A4A"/><circle cx="16" cy="-93" r="5" fill="#1B2A4A"/>
    <path d="M0,-70 Q-12,-58 0,-55 Q12,-58 0,-70" fill="none" stroke="#1B2A4A" stroke-width="2"/>
    <polygon points="-55,-30 55,-30 65,70 -65,70" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <circle cx="0" cy="10" r="25" fill="#C9A96E" opacity="0.2"/>
    <polygon fill="#C9A96E" points="0,-8 6,12 30,14 10,28 15,54 0,40 -15,54 -10,28 -30,14 -6,12"/>
    <text x="0" y="55" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#F7F6F3" font-weight="700">★LEGEND</text>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">LEGD</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">传奇</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"不需要解释，因为你已经超出了评分体系"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• 奥运奖牌/国际公益项目创始人</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• TED演讲者/白宫实习生</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 简历远超高中生范畴</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 挑战：为什么还需要大学？</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：文书表达渴望与下一个目标</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>