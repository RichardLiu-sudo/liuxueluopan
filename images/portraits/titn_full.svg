<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">全能领跑群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <circle cx="0" cy="-85" r="46" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-16" cy="-93" r="5" fill="#1B2A4A"/><circle cx="16" cy="-93" r="5" fill="#1B2A4A"/>
    <path d="M-14,-72 Q0,-58 14,-72" fill="none" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-55,-30 55,-30 65,70 -65,70" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <polygon points="-30,-15 10,-15 10,10 -30,10" fill="#C9A96E" stroke="#1B2A4A" stroke-width="1.5"/>
    <polygon points="-10,-15 30,-15 30,10 -10,10" fill="#C9A96E" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="-10" y="1" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1B2A4A" font-weight="700">🏋</text>
    <text x="10" y="1" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1B2A4A" font-weight="700">🧠</text>
    <circle cx="-20" cy="40" r="5" fill="#F7F6F3"/><circle cx="0" cy="50" r="5" fill="#F7F6F3"/><circle cx="20" cy="40" r="5" fill="#F7F6F3"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">TITN</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">泰坦</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"体能与脑力的双重碾压"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• 校游泳队州冠军</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 数学竞赛国家队成员</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 运动+学术双重卓越极其稀缺</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 挑战：在大学维持运动与学术平衡</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：文书展示赛场上的失败与复盘</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>