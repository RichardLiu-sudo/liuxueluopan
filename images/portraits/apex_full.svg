<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">全能领跑群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <polygon points="0,-180 24,-165 30,-135 0,-120 -30,-135 -24,-165" fill="#1B2A4A" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="0" cy="-85" r="42" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-14" cy="-93" r="5" fill="#1B2A4A"/><circle cx="14" cy="-93" r="5" fill="#1B2A4A"/>
    <path d="M-12,-72 Q0,-60 12,-72" fill="none" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-55" y="-35" width="110" height="110" rx="8" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <line x1="-40" y1="-20" x2="-40" y2="-5" stroke="#C9A96E" stroke-width="3"/><line x1="-40" y1="-5" x2="-25" y2="-5" stroke="#C9A96E" stroke-width="3"/>
    <line x1="40" y1="-20" x2="40" y2="-5" stroke="#C9A96E" stroke-width="3"/><line x1="40" y1="-5" x2="25" y2="-5" stroke="#C9A96E" stroke-width="3"/>
    <rect x="-35" y="15" width="30" height="30" rx="4" fill="#C9A96E" opacity="0.5"/>
    <rect x="5" y="15" width="30" height="30" rx="4" fill="#C9A96E" opacity="0.5"/>
    <text x="0" y="45" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#F7F6F3" font-weight="700">A+</text>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">APEX</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">顶点攀登者</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"当满分只是起点，天花板在哪里？"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• GPA 4.0未加权 / SAT 1600</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 14门AP全5分</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 学术履历超越"优秀"范畴</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 挑战：证明你不只是考试机器</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：文书展示学术之外的深度兴趣</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>