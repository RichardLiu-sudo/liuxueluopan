<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">剑走偏锋群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <circle cx="0" cy="-85" r="44" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-15" cy="-93" r="4" fill="#1B2A4A"/><circle cx="15" cy="-93" r="4" fill="#1B2A4A"/>
    <path d="M-12,-72 Q0,-60 12,-72" fill="none" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
    <rect x="-40" y="-28" width="80" height="98" rx="6" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <circle cx="-12" cy="5" r="10" fill="#C9A96E" opacity="0.4"/>
    <circle cx="12" cy="5" r="10" fill="#C9A96E" opacity="0.6"/>
    <circle cx="0" cy="25" r="14" fill="#C9A96E" opacity="0.5"/>
    <path d="M-20,45 L-10,30 L0,40 L10,28 L20,45" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="-20" cy="45" r="3" fill="#C9A96E"/><circle cx="0" cy="40" r="3" fill="#C9A96E"/><circle cx="20" cy="45" r="3" fill="#C9A96E"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">ARTS</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">艺境旅人</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"作品集比成绩单厚三倍"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• 国家级艺术奖项</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 画作被地方美术馆收藏</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• Behance五万粉丝</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 挑战：SAT 1320 / GPA 3.2</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：作品集证明思考深度</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>