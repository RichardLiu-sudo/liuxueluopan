<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#8A6BB5" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8A6BB5" font-weight="600">特殊画像</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">

<circle cx="0" cy="-85" r="38" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
<circle cx="-12" cy="-92" r="3.5" fill="#1B2A4A"/>
<circle cx="12" cy="-92" r="3.5" fill="#1B2A4A"/>
<path d="M-6,-72 Q0,-66 6,-72" fill="none" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
<rect x="-30" y="-42" width="60" height="97" rx="8" fill="#8A6BB5" stroke="#1B2A4A" stroke-width="2"/>
<line x1="-30" y1="-20" x2="-60" y2="10" stroke="#1B2A4A" stroke-width="4" stroke-linecap="round"/>
<line x1="30" y1="-20" x2="60" y2="10" stroke="#1B2A4A" stroke-width="4" stroke-linecap="round"/>
<circle cx="0" cy="15" r="16" fill="none" stroke="#F7F6F3" stroke-width="3"/>
<line x1="-5" y1="15" x2="5" y2="15" stroke="#F7F6F3" stroke-width="1.5"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">ZERO</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">原点</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"从零开始的不是勇气，是选择"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#8A6BB5" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->

    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• 六维雷达图接近底线</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• GPA<2.5 / 无标化 / 活动空白</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 选择开始本身就证明了勇气</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 社区大学2+2转学是可行路径</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 美国高教最伟大的地方：永远有机会</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#8A6BB5" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>