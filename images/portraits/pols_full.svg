<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">全能领跑群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <polygon points="0,-175 25,-160 25,-130 0,-115 -25,-130 -25,-160" fill="#C9A96E" stroke="#1B2A4A" stroke-width="2"/>
    <circle cx="0" cy="-80" r="45" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-16" cy="-88" r="5" fill="#1B2A4A"/><circle cx="16" cy="-88" r="5" fill="#1B2A4A"/>
    <path d="M-14,-68 Q0,-54 14,-68" fill="none" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-50,-30 50,-30 60,70 -60,70" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <rect x="-30" y="-15" width="60" height="25" rx="4" fill="#C9A96E" opacity="0.7"/>
    <text x="0" y="2" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1B2A4A" font-weight="700">LEADER</text>
    <circle cx="-20" cy="40" r="4" fill="#F7F6F3"/><circle cx="0" cy="50" r="4" fill="#F7F6F3"/><circle cx="20" cy="40" r="4" fill="#F7F6F3"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">POLS</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">北极星</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"天生就知道要把大家带去哪里"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• 学生会主席 / 模联最佳代表</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 市级青年论坛发起人</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 领导力履历厚如小说</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 挑战：别让自己像职业政客</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：文书展示追随而非领导的经历</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>