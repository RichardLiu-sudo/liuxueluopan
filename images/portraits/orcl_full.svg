<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">全能领跑群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <polygon points="0,-170 22,-155 28,-125 0,-110 -28,-125 -22,-155" fill="#1B2A4A" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="0" cy="-80" r="44" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-15" cy="-88" r="4" fill="#1B2A4A"/><circle cx="15" cy="-88" r="4" fill="#1B2A4A"/>
    <rect x="-10" y="-68" width="20" height="5" rx="2" fill="#1B2A4A"/>
    <polygon points="-50,-30 50,-30 55,70 -55,70" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <circle cx="-18" cy="10" r="8" fill="#C9A96E" opacity="0.6"/>
    <circle cx="0" cy="25" r="10" fill="#C9A96E" opacity="0.8"/>
    <circle cx="18" cy="10" r="8" fill="#C9A96E" opacity="0.6"/>
    <line x1="-18" y1="10" x2="0" y2="25" stroke="#C9A96E" stroke-width="1.5"/>
    <line x1="18" y1="10" x2="0" y2="25" stroke="#C9A96E" stroke-width="1.5"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">ORCL</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">神谕者</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"问她的问题，答案都在论文里"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• 两篇一作论文 / 一项专利</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 三次国际科研竞赛金奖</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 招生官看到的是未来学者</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 挑战：社交维度可能被掩盖</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：展示团队合作或科普传播经历</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>