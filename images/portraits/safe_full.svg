<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="800" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cardClip)">
    <!-- Card background -->
    <rect x="0" y="0" width="600" height="800" rx="20" fill="#F7F6F3"/>
    
    <!-- Top stripe -->
    <rect x="0" y="0" width="600" height="12" fill="#1B2A4A"/>
    
    <!-- Group badge top-right -->
    <rect x="420" y="30" width="160" height="36" rx="18" fill="#C9A96E" opacity="0.15"/>
    <text x="500" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C9A96E" font-weight="600">稳步前进群</text>
    
    <!-- Character area -->
    <g transform="translate(300, 280)">
    <circle cx="0" cy="-85" r="44" fill="#F7F6F3" stroke="#1B2A4A" stroke-width="3"/>
    <circle cx="-15" cy="-93" r="4" fill="#1B2A4A"/><circle cx="15" cy="-93" r="4" fill="#1B2A4A"/>
    <path d="M-10,-72 Q0,-64 10,-72" fill="none" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
    <polygon points="-45,-30 45,-30 50,70 -50,70" fill="#3A5078" stroke="#1B2A4A" stroke-width="2"/>
    <rect x="-25" y="-12" width="50" height="30" rx="6" fill="#C9A96E" opacity="0.6"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1B2A4A" font-weight="700">A</text>
    <circle cx="-15" cy="35" r="4" fill="#F7F6F3"/><circle cx="0" cy="45" r="4" fill="#F7F6F3"/><circle cx="15" cy="35" r="4" fill="#F7F6F3"/>
    </g>
    
    <!-- Code - large -->
    <text x="300" y="440" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="800" fill="#1B2A4A" letter-spacing="8">SAFE</text>
    
    <!-- Name -->
    <text x="300" y="488" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#1B2A4A">安全牌</text>
    
    <!-- Tagline -->
    <rect x="80" y="510" width="440" height="44" rx="8" fill="#1B2A4A" opacity="0.05"/>
    <text x="300" y="538" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3A5078" font-style="italic">"从来没有让老师和家长失望过"</text>
    
    <!-- Divider line -->
    <line x1="120" y1="570" x2="480" y2="570" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Description lines -->
    <text x="120" y="600" font-family="sans-serif" font-size="17" fill="#5A6A82">• GPA 3.8 / SAT 1450</text>
    <text x="120" y="632" font-family="sans-serif" font-size="17" fill="#5A6A82">• 完美的"听话"学生</text>
    <text x="120" y="664" font-family="sans-serif" font-size="17" fill="#5A6A82">• 申请像是被安排好的</text>
    <text x="120" y="696" font-family="sans-serif" font-size="17" fill="#5A6A82">• 挑战：区分"被塑造"vs"自驱"</text>
    <text x="120" y="728" font-family="sans-serif" font-size="17" fill="#5A6A82">• 建议：文书中找自主决定的故事</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="788" width="600" height="12" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Brand mark -->
    <text x="300" y="750" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3A5078" opacity="0.5">留学罗盘 · 睿顺国际</text>
    
  </g>
</svg>